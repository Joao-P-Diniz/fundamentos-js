<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
  <!-- usa div no lugar de header -->
  <header>
    <div class="title">
      <h1>Bem-vindo</h1>
    </div>
  </header>
  <!-- o titulo está fora do cabeçalho -->
   <!-- faltou o main -->
    <main>
    <section>
      <h2>Sobre nós</h2>
    
      <!-- h4 deveria ser uma section -->
      <!-- h4 só pode ser usado depois dos h1,h2,h3 -->
        <h3 class="text">Conteúdo aqui</h3>
      <img src="logo.png" alt="logo do site">
      <!-- img tá faltando o alt que é usado para acessibilidade -->
       </section>
    </main>
</body>
</html>
